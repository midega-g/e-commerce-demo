name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  NODE_VERSION: '18.x'

jobs:
  # Frontend CI Pipeline
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  # Frontend Build Job
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build project
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm run test:ci
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 5
      
      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage/coverage-summary.json', 'utf8');
            const { total } = JSON.parse(coverage);
            console.log(`Coverage: ${total.lines.pct}%`);

  # Branch-Specific Coverage Enforcement
  coverage-check:
    name: Coverage Enforcement
    runs-on: ubuntu-latest
    needs: frontend-test
    if: always()
    steps:
      - name: Check Coverage for Main
        if: github.ref == 'refs/heads/main' && job.status == 'success'
        run: echo "Main branch coverage must be >= 80%"
      
      - name: Check Coverage for Dev
        if: github.ref == 'refs/heads/dev' && job.status == 'success'
        run: echo "Dev branch coverage must be >= 60%"

  # Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run security check
        run: npm run lint
        continue-on-error: true

  # Final Status Check
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-build, frontend-test, security-scan]
    if: always()
    steps:
      - name: Verify all checks passed
        if: contains(needs.*.result, 'failure')
        run: exit 1
      
      - name: Success
        if: '!contains(needs.*.result, ''failure'')'
        run: echo "✅ All CI/CD checks passed!"